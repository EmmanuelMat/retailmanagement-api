# Fixed for TigerBeetle - auto-formats, no version
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiscal_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TB_BIN=$(which tigerbeetle 2>/dev/null || echo "/tigerbeetle")
        if [ ! -f /data/0_0.tigerbeetle ]; then
          echo "Formatting TigerBeetle..."
          $TB_BIN format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle || true
        fi
        echo "Starting TigerBeetle..."
        exec $TB_BIN start --addresses=0.0.0.0:3000 --cache-grid=256MiB /data/0_0.tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tbdata:/data

  nats:
    image: nats:2.10-alpine
    command: "-js -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  tbdata:
  natsdata:
