version: '3.9'
# Root docker-compose that orchestrates everything for local dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiscal_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    command: start --addresses=0.0.0.0:3000 --cache-grid=256MiB /data/0_0.tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tbdata:/data

  nats:
    image: nats:2.10-alpine
    command: "-js"
    ports:
      - "4222:4222"

  # Uncomment after first format: docker exec fiscal-core-tigerbeetle-1 tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle

volumes:
  pgdata:
  tbdata:
