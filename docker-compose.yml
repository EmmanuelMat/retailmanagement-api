version: '3.9'
# Fixed for TigerBeetle - auto-formats on first run, then starts
# If tigerbeetle-1 exits with code 1, it's because data file not formatted

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiscal_core
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # TigerBeetle - single replica dev
  # Fix for exit code 1: Needs format first time
  # This entrypoint tries to format, ignores error if already formatted, then starts
  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking /data/0_0.tigerbeetle..."
        if [ ! -f /data/0_0.tigerbeetle ]; then
          echo "Formatting TigerBeetle file first time..."
          /tigerbeetle/tigerbeetle format --cluster=0 --replica=0 --replica-count=1 /data/0_0.tigerbeetle || true
        else
          echo "File already exists, skipping format"
        fi
        echo "Starting TigerBeetle on 0.0.0.0:3000..."
        exec /tigerbeetle/tigerbeetle start --addresses=0.0.0.0:3000 --cache-grid=256MiB /data/0_0.tigerbeetle
    ports:
      - "3000:3000"
    volumes:
      - tbdata:/data

  nats:
    image: nats:2.10-alpine
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  pgdata:
  tbdata:
  nats_data:
